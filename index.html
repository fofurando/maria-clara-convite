<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite 15 Anos</title>
    <link href="https://fonts.googleapis.com/css2?family=Birthstone&family=Baloo+2:wght@600&display=swap" rel="stylesheet">

    <style>
        :root {
            --rose-gold: #E5B299;
            --gold-metallic: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --rosa-quartz: rgba(255, 182, 193, 0.7);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            font-family: 'Baloo 2', cursive;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .main-container {
            position: relative;
            width: 100%; max-width: 450px;
            height: 100vh;
            background: #121212;
            overflow: hidden;
        }

        /* --- ESTILO DOS SELOS --- */
        .selo-protecao {
            position: absolute;
            width: 80px;
            height: 80px;
            background: url('selo.png') center/contain no-repeat;
            opacity: 0.15;
            z-index: 95;
            pointer-events: none;
            display: none;
        }

        .selo-top-right { top: 20px; right: 20px; }
        .selo-bottom-left { bottom: 20px; left: 20px; }

        /* TELA 1: ENVELOPE */
        #startScreen {
            position: absolute;
            width: 100%; height: 100%;
            background: url('envelope.png') center/cover no-repeat;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; cursor: pointer;
        }

        #soundAlert {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--rosa-quartz);
            backdrop-filter: blur(8px);
            color: #fff;
            padding: 10px 25px;
            border-radius: 30px;
            border: 1.5px solid var(--rose-gold);
            font-size: 14px;
            font-weight: bold;
            z-index: 110;
            display: flex; align-items: center; gap: 8px;
            animation: pulseRosa 2s infinite;
        }

        @keyframes pulseRosa {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
        }

        .tap-text {
            position: absolute;
            bottom: 15%;
            font-family: 'Birthstone', cursive;
            font-size: 58px;
            background: var(--gold-metallic);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
            animation: suaveBlink 2.5s infinite;
        }

        @keyframes suaveBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        video, .bg-img {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 10;
        }

        .fade-out { animation: fadeOutAnim 0.8s forwards; }
        .fade-in { display: block !important; animation: fadeInAnim 0.6s forwards; }

        @keyframes fadeOutAnim { from { opacity: 1; } to { opacity: 0; } }
        @keyframes fadeInAnim { from { opacity: 0; } to { opacity: 1; } }

        #screenConvite, #screenPresentes {
            display: none;
            position: absolute;
            width: 100%; height: 100%;
            opacity: 0;
            z-index: 20;
        }

        .btn-invisible {
            position: absolute; 
            z-index: 120;
            background: transparent; 
            border: none; 
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- BOTÕES TELA CONVITE --- */
        .pos-confirmar { width: 15%; height: 8%; left: 25%; top: 64%; }
        .pos-mapa { width: 15%; height: 8%; left: 42%; top: 64%; }
        .pos-presentes { width: 15%; height: 8%; left: 60%; top: 64%; }
        .pos-voltar { width: 15%; height: 6%; left: 21%; top: 51.6%; }

    </style>
</head>
<body>

    <audio id="musicaFundo" src="musica.mp3" loop></audio>
    
    <div class="main-container">
        
        <div class="selo-protecao selo-top-right"></div>
        <div class="selo-protecao selo-bottom-left"></div>

        <div id="soundAlert">🌸 LIGUE O SOM!</div>

        <div id="startScreen" onclick="iniciar()">
            <div class="tap-text">Toque para abrir</div>
        </div>

        <video id="videoIntro" src="video.mp4" playsinline muted preload="auto"></video>

        <div id="screenConvite">
            <img src="convite.png" class="bg-img">
            <button class="btn-invisible pos-confirmar" onclick="confirmar()"></button>
            <button class="btn-invisible pos-mapa" onclick="abrirMapa()"></button>
            <button class="btn-invisible pos-presentes" onclick="mostrarPresentes()"></button>
        </div>

        <div id="screenPresentes">
            <img src="presentes.png" class="bg-img">
            <button class="btn-invisible pos-voltar" onclick="voltar()"></button>
        </div>

    </div>

    <script>
        const vIntro = document.getElementById('videoIntro');
        const musica = document.getElementById('musicaFundo');
        const screenConvite = document.getElementById('screenConvite');
        const screenPresentes = document.getElementById('screenPresentes');
        const selos = document.querySelectorAll('.selo-protecao');

        function iniciar() {
            // Inicia o som
            musica.play().catch(e => console.log("Áudio bloqueado ou não encontrado"));
            
            // Inicia o vídeo (com muted ele sempre vai rodar)
            vIntro.play().catch(e => console.log("Erro ao rodar vídeo"));

            document.getElementById('startScreen').classList.add('fade-out');
            document.getElementById('soundAlert').style.display = 'none';
            
            // Mostra os selos
            selos.forEach(s => s.style.display = 'block');

            setTimeout(() => {
                document.getElementById('startScreen').style.display = 'none';
            }, 800);
        }

        vIntro.onended = function() {
            vIntro.classList.add('fade-out');
            setTimeout(() => {
                vIntro.style.display = 'none';
                screenConvite.classList.add('fade-in');
            }, 600);
        };

        function mostrarPresentes() {
            screenConvite.style.display = 'none';
            screenPresentes.classList.remove('fade-out');
            screenPresentes.classList.add('fade-in');
        }

        function voltar() {
            screenPresentes.style.display = 'none';
            screenPresentes.classList.remove('fade-in');
            screenConvite.style.display = 'block';
            screenConvite.style.opacity = '1';
        }

        function abrirMapa() { window.open("https://www.google.com/maps"); } // Ajuste o link real aqui
        function confirmar() { window.open("https://wa.link/fmhy6a"); }
        
    </script>
</body>
</html>
